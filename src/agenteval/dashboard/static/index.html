<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentEval Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;height:100vh;background:#f5f6fa;color:#333}
nav{width:200px;background:#1e293b;color:#fff;padding:24px 16px;flex-shrink:0}
nav h2{font-size:16px;margin-bottom:24px;opacity:.7;letter-spacing:1px}
nav a{display:block;padding:10px 12px;margin-bottom:4px;border-radius:6px;color:#cbd5e1;text-decoration:none;cursor:pointer;font-size:14px}
nav a:hover,nav a.active{background:#334155;color:#fff}
main{flex:1;padding:24px 32px;overflow-y:auto}
h1{font-size:22px;margin-bottom:16px}
.cards{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.card{background:#fff;border-radius:8px;padding:16px 20px;min-width:160px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card .label{font-size:12px;color:#64748b;text-transform:uppercase;letter-spacing:.5px}
.card .value{font-size:28px;font-weight:700;margin-top:4px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}
th,td{text-align:left;padding:10px 14px;font-size:14px}
th{background:#f1f5f9;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:#475569}
tr:not(:last-child) td{border-bottom:1px solid #e2e8f0}
tr:hover td{background:#f8fafc}
.pass{color:#16a34a;font-weight:600}.fail{color:#dc2626;font-weight:600}
.clickable{cursor:pointer}
.back{display:inline-block;margin-bottom:12px;color:#3b82f6;cursor:pointer;font-size:14px}
#chart-wrap{background:#fff;border-radius:8px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08);max-width:800px}
select{padding:6px 10px;border-radius:6px;border:1px solid #cbd5e1;font-size:14px;margin-bottom:16px}
.empty{color:#94a3b8;font-style:italic;margin-top:24px}
</style>
</head>
<body>
<nav>
  <h2>AgentEval</h2>
  <a class="active" data-view="runs">Runs</a>
  <a data-view="trends">Trends</a>
</nav>
<main id="app"></main>
<script>
const $ = (s, el=document) => el.querySelector(s);
const app = $('#app');
let currentView = 'runs';

document.querySelectorAll('nav a[data-view]').forEach(a => {
  a.addEventListener('click', () => {
    document.querySelectorAll('nav a').forEach(x => x.classList.remove('active'));
    a.classList.add('active');
    currentView = a.dataset.view;
    if (currentView === 'runs') showRuns();
    else if (currentView === 'trends') showTrends();
  });
});

async function api(path) {
  const r = await fetch(path);
  return r.json();
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmt(v, d=2) { return v == null ? '\u2014' : typeof v === 'number' ? v.toFixed(d) : esc(String(v)); }
function fmtPct(v) { return v == null ? '\u2014' : (v * 100).toFixed(1) + '%'; }
function fmtCost(v) { return v == null ? '\u2014' : '$' + v.toFixed(4); }
function fmtDate(s) { if (!s) return '\u2014'; return esc(s.length > 16 ? s.slice(0,16).replace('T',' ') : s); }

function setContent(el, html) { el.innerHTML = html; }

async function showRuns() {
  const runs = await api('/api/runs');
  if (!runs.length) { setContent(app, '<h1>Runs</h1><p class="empty">No runs found. Run an evaluation first.</p>'); return; }
  let html = '<h1>Runs</h1><table><thead><tr><th>Date</th><th>Suite</th><th>Pass Rate</th><th>Total</th><th>Cost</th><th>ID</th></tr></thead><tbody>';
  for (const r of runs) {
    const s = r.summary || {};
    html += '<tr class="clickable" data-id="' + esc(r.id) + '">'
      + '<td>' + fmtDate(r.created_at) + '</td><td>' + esc(r.suite) + '</td>'
      + '<td>' + fmtPct(s.pass_rate) + '</td><td>' + (s.total != null ? s.total : '\u2014') + '</td>'
      + '<td>' + fmtCost(s.cost_usd) + '</td><td style="font-family:monospace;font-size:12px">' + esc(r.id.slice(0,8)) + '</td></tr>';
  }
  html += '</tbody></table>';
  setContent(app, html);
  app.querySelectorAll('tr.clickable').forEach(tr => {
    tr.addEventListener('click', () => showRunDetail(tr.dataset.id));
  });
}

async function showRunDetail(id) {
  const run = await api('/api/runs/' + encodeURIComponent(id));
  if (run.error) { setContent(app, '<p class="empty">Run not found.</p>'); return; }
  const s = run.summary || {};
  let html = '<span class="back" id="back-btn">&larr; Back to runs</span>'
    + '<h1>' + esc(run.suite) + ' &mdash; ' + fmtDate(run.created_at) + '</h1>'
    + '<div class="cards">'
    + '<div class="card"><div class="label">Pass Rate</div><div class="value">' + fmtPct(s.pass_rate) + '</div></div>'
    + '<div class="card"><div class="label">Passed</div><div class="value">' + (s.passed != null ? s.passed : '\u2014') + ' / ' + (s.total != null ? s.total : '\u2014') + '</div></div>'
    + '<div class="card"><div class="label">Total Cost</div><div class="value">' + fmtCost(s.cost_usd) + '</div></div>'
    + '<div class="card"><div class="label">Agent</div><div class="value" style="font-size:16px">' + esc(run.agent_ref || '\u2014') + '</div></div>'
    + '</div>';
  if (run.results && run.results.length) {
    html += '<table><thead><tr><th>Case</th><th>Pass</th><th>Score</th><th>Cost</th><th>Latency</th><th>Tokens</th></tr></thead><tbody>';
    for (const r of run.results) {
      html += '<tr><td>' + esc(r.case_name) + '</td>'
        + '<td class="' + (r.passed ? 'pass' : 'fail') + '">' + (r.passed ? 'PASS' : 'FAIL') + '</td>'
        + '<td>' + fmt(r.score) + '</td><td>' + fmtCost(r.cost_usd) + '</td>'
        + '<td>' + r.latency_ms + 'ms</td><td>' + (r.tokens_in + r.tokens_out) + '</td></tr>';
    }
    html += '</tbody></table>';
  }
  setContent(app, html);
  $('#back-btn').addEventListener('click', showRuns);
}

let trendChart = null;
async function showTrends() {
  const suites = await api('/api/suites');
  let html = '<h1>Trends</h1>';
  if (!suites.length) { setContent(app, html + '<p class="empty">No suites found.</p>'); return; }
  html += '<select id="suite-select">' + suites.map(s => '<option value="' + esc(s) + '">' + esc(s) + '</option>').join('') + '</select>';
  html += '<div id="chart-wrap"><canvas id="trend-chart"></canvas></div>';
  setContent(app, html);
  const sel = $('#suite-select');
  sel.addEventListener('change', () => loadTrend(sel.value));
  loadTrend(suites[0]);
}

async function loadTrend(suite) {
  const data = await api('/api/trends?suite=' + encodeURIComponent(suite));
  const labels = data.map(d => fmtDate(d.created_at));
  const rates = data.map(d => d.pass_rate == null ? null : +(d.pass_rate * 100).toFixed(1));
  if (trendChart) trendChart.destroy();
  trendChart = new Chart($('#trend-chart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Pass Rate %',
        data: rates,
        borderColor: '#3b82f6',
        backgroundColor: 'rgba(59,130,246,.1)',
        fill: true,
        tension: 0.3,
        spanGaps: true
      }]
    },
    options: {
      responsive: true,
      scales: { y: { min: 0, max: 100, ticks: { callback: v => v + '%' } } },
      plugins: { legend: { display: false } }
    }
  });
}

showRuns();
</script>
</body>
</html>
